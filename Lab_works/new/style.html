<!DOCTYPE html>
<html>
<head>
    <title>CSS Text Styling</title>

    <style>
        h2 {
            font-family: Arial;
            color: darkgreen;
        }

        p {
            font-size: 18px;
            color: navy;
        }
    </style>
</head>

<body>

    <h2>CSS Text Styling</h2>

    <p>
        This text demonstrates font, size, and color properties.
    </p>

</body>
</html>
