<!DOCTYPE html>
<html>
<head>
    <title>String Methods</title>
</head>

<body>

    <h2>ES6 String Methods</h2>

    <script>
        let text = "Web Technology";

        document.write("Original String: " + text + "<br><br>");

        document.write("Length: " + text.length + "<br>");
        document.write("Upper Case: " + text.toUpperCase() + "<br>");
        document.write("Lower Case: " + text.toLowerCase() + "<br>");
        document.write("Substring: " + text.substring(0, 3) + "<br>");
        document.write("Replace: " + text.replace("Web", "Internet") + "<br>");
        document.write("Character At 2: " + text.charAt(2));
    </script>

</body>
</html>
